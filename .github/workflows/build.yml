name: Build FTS Link Host

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (Apple Silicon)
            asset: FTS-Link-Host-macOS-AppleSilicon.zip
          - os: macos-13
            label: macOS (Intel)
            asset: FTS-Link-Host-macOS-Intel.zip
          - os: windows-latest
            label: Windows
            asset: FTS-Link-Host-Windows.exe
    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --windowed --name "FTS Link Host" --collect-all aiortc --collect-all av --collect-all aioice --collect-all pylibsrtp --collect-all google_crc32c --collect-all pynput --collect-all mss host_agent.py
          ditto -c -k --keepParent "dist/FTS Link Host.app" "${{ matrix.asset }}"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "FTS Link Host" --collect-all aiortc --collect-all av --collect-all aioice --collect-all pylibsrtp --collect-all google_crc32c --collect-all pynput --collect-all mss host_agent.py
          Copy-Item "dist/FTS Link Host.exe" "${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all built apps
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish to a permanent Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: FTS Link Host (latest)
          body: |
            Latest FTS Link Host apps. Download the one for your computer:

            - macOS (Apple Silicon / M-series): FTS-Link-Host-macOS-AppleSilicon.zip
            - macOS (Intel): FTS-Link-Host-macOS-Intel.zip
            - Windows: FTS-Link-Host-Windows.exe

            Unsigned, so on first run: macOS - System Settings > Privacy & Security > Open Anyway; Windows - More info > Run anyway.
          files: dist/**/*
